version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: sanitary-mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network
    environment:
      - MONGO_INITDB_DATABASE=sanitary_control_db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sanitary-backend
    restart: always
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=sanitary_control_db
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production-123456
      - TELEGRAM_BOT_TOKEN=8435342350:AAHpzv8g1lg42yYM_OpiF1xHlaY8Hk7lpmQ
      - YANDEX_API_KEY=c6d6dc12-3699-4309-9fe1-b5173399116d
      - WEBAPP_URL=https://bgmk-obsh.duckdns.org
    networks:
      - app-network
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=https://bgmk-obsh.duckdns.org
    container_name: sanitary-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - app-network
    ports:
      - "3000:80"

  nginx:
    image: nginx:alpine
    container_name: sanitary-nginx
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    container_name: sanitary-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
